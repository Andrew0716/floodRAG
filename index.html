<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LÄNDLEGUARD - FLIWAS 홍수 위험 분석</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    .markdown-body h1 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; color: #1e3a8a; }
    .markdown-body h2 { font-size: 1.2em; font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; color: #2563eb; }
    .markdown-body p { margin-bottom: 1em; line-height: 1.6; }
    .markdown-body ul { list-style-type: disc; padding-left: 20px; margin-bottom: 1em; }
    .markdown-body li { margin-bottom: 0.25em; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
  <header class="bg-blue-900 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold tracking-wider">LÄNDLEGUARD <span class="text-sm font-normal text-blue-200">| FLIWAS Analysis</span></h1>
      <nav class="space-x-6 text-sm">
        <a href="#" class="hover:text-blue-300 transition">위험 지도</a>
        <a href="#" class="hover:text-blue-300 transition">방재 가이드</a>
        <a href="#" class="hover:text-blue-300 transition">팀 소개</a>
      </nav>
    </div>
  </header>

  <section class="max-w-6xl mx-auto px-4 py-16 text-center">
    <h2 class="text-3xl md:text-4xl font-bold leading-tight mb-4 text-blue-900">
      우리 집 홍수 위험, 어느 정도일까요?
    </h2>
    <p class="text-lg mb-8 text-slate-600">주소를 입력하시면 수문학적 데이터와 예방 지침(BBK)을 기반으로<br>맞춤형 재난 위험 분석 리포트를 PDF로 제공해 드립니다.</p>
    
    <div class="flex justify-center max-w-2xl mx-auto shadow-lg rounded-lg">
      <input id="address" type="text" placeholder="예: Heilbronn, Baden-Württemberg 또는 도로명 주소" class="w-full px-5 py-4 border-2 border-r-0 border-blue-200 rounded-l-lg focus:outline-none focus:border-blue-500 text-lg">
      <button id="sendBtn" onclick="analyzeRisk()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-r-lg font-bold transition text-lg whitespace-nowrap">
        위험도 분석
      </button>
    </div>
  </section>

  <section class="max-w-4xl mx-auto px-4 py-8 hidden" id="reportSection">
    <div class="flex justify-between items-end mb-4">
      <h3 class="text-2xl font-bold text-slate-800">분석 리포트</h3>
      <button onclick="downloadPDF()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded shadow flex items-center gap-2 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        PDF로 다운로드
      </button>
    </div>
    
    <div id="pdfContent" class="bg-white border border-slate-200 rounded-xl p-8 shadow-sm markdown-body">
      <div id="loading" class="text-center text-slate-500 py-10 hidden">
        <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-blue-600 rounded-full mb-2" role="status" aria-label="loading"></div>
        <p>AI가 수문학 데이터와 방재 매뉴얼을 매칭하여 리포트를 생성 중입니다...</p>
      </div>
      <div id="resultContent" class="text-slate-800">
        </div>
    </div>
  </section>

  <footer class="bg-slate-800 py-8 text-center text-sm text-slate-400 mt-20">
    <div class="max-w-6xl mx-auto px-4">
      <p>© 2026 LÄNDLEGUARD Project Team. All rights reserved.</p>
      <p class="mt-2">본 서비스는 수문학적 연결망을 활용한 재난 경고 로직 프로토타입입니다.</p>
    </div>
  </footer>

  <script>
    // 마크다운 형태의 응답을 간단한 HTML로 변환하는 함수
    function parseMarkdown(text) {
      let html = text.replace(/^### (.*$)/gim, '<h2>$1</h2>')
                     .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                     .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                     .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                     .replace(/\*(.*)\*/gim, '<em>$1</em>')
                     .replace(/^\* (.*$)/gim, '<ul><li>$1</li></ul>')
                     .replace(/^\- (.*$)/gim, '<ul><li>$1</li></ul>')
                     .replace(/\n/gim, '<br>');
      // 연속된 ul 태그 합치기
      html = html.replace(/<\/ul><br><ul>/gim, '');
      return html;
    }

    async function analyzeRisk() {
      const address = document.getElementById("address").value;
      if (!address) {
        alert("주소를 입력해주세요.");
        return;
      }

      document.getElementById("reportSection").classList.remove("hidden");
      document.getElementById("resultContent").innerHTML = "";
      document.getElementById("loading").classList.remove("hidden");

      try {
        const response = await fetch("/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ address })
        });

        const data = await response.json();
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("resultContent").innerHTML = parseMarkdown(data.answer);
      } catch (error) {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("resultContent").innerHTML = "<p class='text-red-500'>서버 통신 중 오류가 발생했습니다.</p>";
      }
    }

    // 엔터키 처리
    document.getElementById("address").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        analyzeRisk();
      }
    });

    // PDF 다운로드 함수 (html2pdf.js 사용)
    function downloadPDF() {
      const element = document.getElementById('pdfContent');
      const address = document.getElementById("address").value || "지역";
      
      const opt = {
        margin:       10,
        filename:     `LÄNDLEGUARD_홍수위험분석_${address}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2 },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      html2pdf().set(opt).from(element).save();
    }
  </script>
</body>
</html>

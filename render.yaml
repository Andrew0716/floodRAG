services:
  - type: web
    name: landleguard-flask-app
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # 만약 app.py에서 os.getenv("TENSORIX_API_KEY")로 받도록 수정한다면 아래 주석을 해제하고 사용하세요.
      # - key: TENSORIX_API_KEY
